name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        shell: pwsh
        run: |
          cd src
          pyinstaller --onefile --windowed --name ATC_Advisor `
            --paths . `
            --hidden-import ui.app `
            --hidden-import ui.languages `
            --hidden-import core.logic `
            --hidden-import core.distance `
            --hidden-import core.position `
            --hidden-import core.settings `
            --hidden-import integrations.vatsim `
            --hidden-import integrations.airports `
            main.py

      - name: Create ZIP
        run: |
          Compress-Archive -Path dist/ATC_Advisor.exe -DestinationPath ATC_Advisor.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ATC_Advisor.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
